services:
  - type: web
    name: creatix-backend
    env: docker
    region: ohio
    plan: free
    healthCheckPath: /api/public/services
    envVars:
      - key: PORT
        value: 10000
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: creatix-db
          property: internalConnectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: creatix-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: creatix-db
          property: password
      - key: SPRING_DATASOURCE_DRIVER_CLASS_NAME
        value: org.postgresql.Driver
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://creatix-solutions.vercel.app
      - key: ADMIN_EMAIL
        value: admin@creatix.com

databases:
  - name: creatix-db
    databaseName: creatix
    user: creatix_user
    plan: free
