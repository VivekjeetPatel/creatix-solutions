# Application Configuration
server.port=${PORT:8080}

# Database - Render Postgres + Local H2 Fallback
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:creatix_db;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=USER}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# H2 Console (available at /h2-console locally)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
jwt.secret=${JWT_SECRET:creatix_super_secret_key_2024_must_be_256_bits_long_at_least_32chars}
jwt.expiration=86400000

# Mail - SMTP (configure your mail provider)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Admin notification email
admin.email=${ADMIN_EMAIL:admin@creatix.com}

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# Logging
logging.level.com.creatix=DEBUG
